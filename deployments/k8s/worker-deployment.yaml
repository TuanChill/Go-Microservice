apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-service-worker
  template:
    metadata:
      labels:
        app: go-service-worker
    spec:
      containers:
        - name: worker
          image: your-registry/go-service-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: go-service-config
            - secretRef:
                name: go-service-secrets
          # Add a liveness probe once the worker exposes a health endpoint or heartbeat.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
