apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-service-api
  template:
    metadata:
      labels:
        app: go-service-api
    spec:
      containers:
        - name: api
          image: your-registry/go-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: go-service-config
            - secretRef:
                name: go-service-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
