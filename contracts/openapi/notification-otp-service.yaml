openapi: 3.0.3
info:
  title: Notification OTP Service API
  version: 1.0.0
servers:
  - url: http://notification-otp-service:8000
security:
  - serviceJwt: []
paths:
  /internal/otp/request:
    post:
      operationId: requestOtp
      summary: Create an OTP for a user and schedule delivery
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequestCommand'
      responses:
        '201':
          description: OTP created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResponse'
  /internal/otp/verify:
    post:
      operationId: verifyOtp
      summary: Verify an active OTP code
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOtpResponse'
        '400':
          description: OTP not found or inactive
  /internal/notifications/email-verification:
    post:
      operationId: sendEmailVerification
      summary: Schedule account verification email delivery
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '202':
          description: Email verification delivery scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationAcceptedResponse'
  /internal/notifications/password-reset:
    post:
      operationId: sendPasswordReset
      summary: Schedule password reset email delivery
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: Password reset delivery scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationAcceptedResponse'
components:
  securitySchemes:
    serviceJwt:
      type: http
      scheme: bearer
      bearerFormat: service-jwt
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 8
  schemas:
    OtpRequestCommand:
      type: object
      required: [user_id, email, purpose]
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
        purpose:
          type: string
          enum: [login, email_update, password_reset]
    OtpResponse:
      type: object
      required: [id, user_id, expires_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
        expires_at:
          type: string
          format: date-time
    VerifyOtpRequest:
      type: object
      required: [otp]
      properties:
        otp:
          type: string
    VerifyOtpResponse:
      type: object
      required: [user_id, email]
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
    EmailVerificationRequest:
      type: object
      required: [user_id, email, token, expires_at_token]
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
        token:
          type: string
        expires_at_token:
          type: string
          format: date-time
    PasswordResetRequest:
      type: object
      required: [user_id, email, token]
      properties:
        user_id:
          type: integer
        email:
          type: string
          format: email
        token:
          type: string
    NotificationAcceptedResponse:
      type: object
      required: [idempotency_key]
      properties:
        idempotency_key:
          type: string
